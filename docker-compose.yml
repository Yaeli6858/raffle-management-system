version: '3.9'

services:
  redis:
    image: redis:7.0-alpine
    container_name: raffle-redis
    command:
      - redis-server
      - --requirepass
      - "Devora!123"
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: raffle-server
    ports:
      - "5072:80"
    depends_on:
      - redis # הסרנו את db מכאן
    extra_hosts:
      - "host.docker.internal:host-gateway" # הוספנו את השורה הזו
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:80"
      # עדכנו את ה-Server כאן ל-host.docker.internal
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=RaffleDb;User Id=sa;Password=Devora123!;TrustServerCertificate=True"
      Redis__Configuration: "redis:6379,password=Devora!123"
      Cache__GiftCacheTtlSeconds: 300
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: raffle-client
    ports:
      - "4200:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redisdata:
    name: raffle-redis-data
